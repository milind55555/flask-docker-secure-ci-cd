name: CI/CD pipeline

on:
  push:
    branches:
      - "main"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo11-flask-app:latest .

      # 🔍 Trivy filesystem scan (checks code & dependencies)
      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          path: .
          format: table
          severity: HIGH,CRITICAL

      # 🔍 Trivy image scan (checks built image)
      - name: Trivy Image scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/demo11-flask-app:latest
          format: table
          severity: HIGH,CRITICAL

      - name: Run Container
        run: docker run -d -p 5001:5000 ${{ secrets.DOCKER_USERNAME }}/demo11-flask-app:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/demo11-flask-app:latest
